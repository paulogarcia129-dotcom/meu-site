<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube do Green</title>

<style>
body { background:#0f172a;color:white;font-family:Arial;padding:15px; }
.container { max-width:500px;margin:auto; }
.card { background:#1e293b;padding:15px;border-radius:12px;margin-top:10px; }
.btn { padding:15px;border-radius:10px;text-align:center;font-weight:bold;margin-top:10px; }
.vip { background:#22c55e;font-size:18px; }
.gratis { background:#3b82f6; }
.odd { color:#22c55e;font-weight:bold; }
</style>

</head>

<body>

<div class="container">

<h1 style="text-align:center;color:#22c55e;">🔥 Clube do Green</h1>

<p style="text-align:center;">Atualizado automaticamente todos os dias</p>

<p style="text-align:center;">✅ 12 greens seguidos</p>
<p style="text-align:center;">📈 +320 unidades de lucro</p>

<h2>🔥 Bilhete do Dia (ODD 3.20)</h2>

<div id="jogos"></div>

<a href="https://wa.me/5583974003238" target="_blank">
  <div class="btn gratis">📲 Entrar no Grupo Grátis</div>
</a>

<a href="https://wa.me/5583974003238" target="_blank">
  <div class="btn vip">🚀 ENTRAR NO VIP AGORA</div>
</a>

</div>

<script>
const jogos = [
  {home:"Inter", away:"Cagliari", palpite:"Inter vence", odd:"1.55"},
  {home:"Real Madrid", away:"Getafe", palpite:"Real Madrid vence", odd:"1.40"},
  {home:"Köln", away:"St. Pauli", palpite:"+2.5 gols", odd:"1.80"}
];

const container = document.getElementById("jogos");

jogos.forEach(jogo => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>${jogo.home} x ${jogo.away}</h3>
    <p>Palpite: ${jogo.palpite}</p>
    <p class="odd">Odd: ${jogo.odd}</p>
    <button onclick="copiar('${jogo.palpite} - ${jogo.odd}')"
    style="margin-top:10px;padding:10px;border:none;border-radius:8px;background:#22c55e;color:white;">
    📋 Copiar aposta
    </button>
  `;

  container.appendChild(div);
});

function copiar(texto){
  navigator.clipboard.writeText(texto);
  alert("Aposta copiada!");
}
</script>

</body>
</html>
