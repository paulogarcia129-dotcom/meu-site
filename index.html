<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube do Green</title>

<style>
body { background:#0f172a;color:white;font-family:Arial;padding:15px; }
.container { max-width:500px;margin:auto; }
.card { background:#1e293b;padding:15px;border-radius:12px;margin-top:10px; }
.btn { padding:15px;border-radius:10px;text-align:center;font-weight:bold;margin-top:10px; }
.vip { background:#22c55e;font-size:18px; }
</style>

</head>

<body>

<div class="container">

<h1 style="color:#22c55e;">🔥 Clube do Green</h1>
<p>Jogos atualizados automaticamente</p>

<div id="jogos"></div>

<a href="https://wa.me/5583974003238" target="_blank">
<div class="btn vip">🚀 ENTRAR NO VIP</div>
</a>

</div>

<script>
async function carregarJogos() {
  const url = "https://api-football-v1.p.rapidapi.com/v3/fixtures?next=5";

  const options = {
    method: "GET",
    headers: {
      "X-RapidAPI-Key": "SUA_API_KEY",
      "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
    }
  };

  const resposta = await fetch(url, options);
  const dados = await resposta.json();

  const container = document.getElementById("jogos");

  dados.response.forEach(jogo => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${jogo.teams.home.name} x ${jogo.teams.away.name}</h3>
      <p>🔥 Jogo ao vivo / próximo</p>
    `;

    container.appendChild(div);
  });
}

carregarJogos();
</script>

</body>
</html>
