<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube do Green</title>

<style>
body { background:#0f172a;color:white;font-family:Arial;padding:15px; }
.container { max-width:500px;margin:auto; }

h1 { color:#22c55e;text-align:center; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.btn {
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.vip { background:#22c55e;font-size:18px; }
.gratis { background:#3b82f6; }

.loading {
  text-align:center;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 Clube do Green</h1>
<p style="text-align:center;">Jogos atualizados automaticamente</p>

<p style="text-align:center;">✅ 12 greens seguidos</p>
<p style="text-align:center;">📈 +320 unidades de lucro</p>

<h2 style="margin-top:15px;">🔥 Jogos do Dia</h2>

<div id="jogos" class="loading">Carregando jogos...</div>

<!-- BOTÕES -->

<a href="https://wa.me/5583974003238" target="_blank">
  <div class="btn gratis">📲 Entrar no Grupo Grátis</div>
</a>

<a href="https://wa.me/5583974003238" target="_blank">
  <div class="btn vip">🚀 ENTRAR NO VIP AGORA</div>
</a>

<p style="margin-top:20px;font-size:12px;color:#94a3b8;text-align:center;">
⚠️ Aposte com responsabilidade.
</p>

</div>

<script>
async function carregarJogos() {
  const url = "https://api-football-v1.p.rapidapi.com/v3/fixtures?next=5";

  const options = {
    method: "GET",
    headers: {
      "X-RapidAPI-Key": "2f101f731cf2f6dbd4442095a6abd973",
      "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
    }
  };

  try {
    const resposta = await fetch(url, options);
    const dados = await resposta.json();

    const container = document.getElementById("jogos");
    container.innerHTML = "";

    dados.response.forEach(jogo => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${jogo.teams.home.name} x ${jogo.teams.away.name}</h3>
        <p>⏰ ${new Date(jogo.fixture.date).toLocaleString()}</p>
        <button onclick="copiar('${jogo.teams.home.name} x ${jogo.teams.away.name}')"
        style="margin-top:10px;padding:10px;border-radius:8px;border:none;background:#22c55e;color:white;">
        📋 Copiar jogo
        </button>
      `;

      container.appendChild(div);
    });

  } catch (erro) {
    document.getElementById("jogos").innerHTML = "Erro ao carregar jogos";
  }
}

function copiar(texto) {
  navigator.clipboard.writeText(texto);
  alert("Jogo copiado!");
}

carregarJogos();
</script>

</body>
</html>
